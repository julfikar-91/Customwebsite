services:
  custom-websites:
    image: nginx:alpine
    container_name: betazenx_custom_websites
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/usr/share/nginx/html:ro
    # Add light memory limits to ensure zero server impact
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 100M
    networks:
      - betazenx_internal

networks:
  betazenx_internal:
    name: betazenx_network
    external: true
